<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Summer</title>

<style>
body {
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background:#f6f5f4;
margin:0;
padding:20px;
color:#333;
}

h1{
font-family: Georgia, serif;
font-size:38px;
margin-bottom:0;
}

}

margin-top:40px;
}

.section-title{

color:#8c8f95;
margin-bottom:15px;
}

.palette{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.swatch{
aspect-ratio:1/1;
border-radius:18px;
}
</style>
</head>
